<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Cyber Guard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(#050510,#10103a);
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
    color:#00e5ff;
    text-shadow:0 0 10px cyan;
}

.characters{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    margin-top:20px;
    flex-wrap:wrap;
}

.card{
    width:220px;
    padding:20px;
    border-radius:20px;
    background:#15153a;
    box-shadow:0 0 20px rgba(0,255,255,0.3);
}

.hero{
    border:2px solid cyan;
}

.enemy{
    border:2px solid red;
    box-shadow:0 0 20px rgba(255,0,0,0.4);
}

.icon{
    font-size:90px;
}

.hero .name{
    color:cyan;
}

.enemy .name{
    color:#ff3c3c;
}

#messageBox{
    background:#1c1c3c;
    padding:20px;
    border-radius:10px;
    width:80%;
    margin:20px auto;
    font-size:20px;
}

button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.aman{
    background:#2ecc71;
    color:white;
}

.phishing{
    background:#e74c3c;
    color:white;
}

#restartBtn{
    display:none;
    background:orange;
    color:white;
}

#lives{
    font-size:25px;
    margin-top:10px;
}

</style>
</head>

<body>

<h1>🛡️ CYBER GUARD 🦠</h1>

<div id="startScreen">
    <div class="characters">

        <div class="card hero">
            <div class="icon">🤖</div>
            <h2>CYBER</h2>
        </div>

        <div class="card enemy">
            <div class="icon">🦠</div>
            <h2>TROJANX</h2>
        </div>

    </div>

    <button onclick="startGame()">START GAME</button>
</div>

<div id="game" style="display:none;">

    <div id="lives">❤️❤️❤️❤️❤️</div>

    <div id="messageBox"></div>

    <button class="aman" onclick="answer('aman')">AMAN</button>
    <button class="phishing" onclick="answer('phishing')">PHISHING</button>

    <h2 id="score">Score: 0 / 50</h2>

    <button onclick="backToMenu()">MENU</button>
    <button id="restartBtn" onclick="resetGame()">ULANG</button>

</div>

<script>

// ================= SUARA CYBER THEME =================
const winSound = new Audio("https://cdn.pixabay.com/download/audio/2022/10/16/audio_3a1b6c6c7a.mp3?filename=game-level-complete-143022.mp3");

const loseSound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_4a1f2b5f2b.mp3?filename=negative_beeps-6008.mp3");

winSound.preload = "auto";
loseSound.preload = "auto";

// unlock audio (biar aman di browser PC)
function unlockAudio(){
    winSound.play().then(()=>{winSound.pause(); winSound.currentTime=0;}).catch(()=>{});
    loseSound.play().then(()=>{loseSound.pause(); loseSound.currentTime=0;}).catch(()=>{});
}

// ================= GAME DATA =================
const messages = [
    { text:"http://bank-login.xyz", type:"phishing" },
    { text:"https://www.google.com", type:"aman" },
    { text:"http://freegift123.click", type:"phishing" },
    { text:"https://www.youtube.com", type:"aman" },
    { text:"https://tokopedia-verifikasi.id", type:"phishing" },
    { text:"https://www.github.com", type:"aman" }
];

let score = 0;
let lives = 5;
let current;
let shuffled = [];
let index = 0;

// ================= START =================
function startGame(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("game").style.display = "block";

    unlockAudio();
    resetGame();
}

// ================= RESET =================
function resetGame(){
    score = 0;
    lives = 5;
    index = 0;

    shuffled = [...messages].sort(()=>Math.random()-0.5);

    document.getElementById("restartBtn").style.display = "none";

    updateHUD();
    nextQuestion();
}

// ================= HUD =================
function updateHUD(){
    document.getElementById("score").innerText = "Score: " + score + " / 50";
    document.getElementById("lives").innerText = "❤️".repeat(lives);
}

// ================= QUESTION =================
function nextQuestion(){
    if(index >= shuffled.length){
        index = 0;
        shuffled = [...messages].sort(()=>Math.random()-0.5);
    }

    current = shuffled[index++];
    document.getElementById("messageBox").innerText = current.text;
}

// ================= ANSWER =================
function answer(choice){

    if(choice === current.type){
        score += 5;
    }else{
        lives--;
    }

    updateHUD();

    if(score >= 50){
        winGame();
        return;
    }

    if(lives <= 0){
        gameOver();
        return;
    }

    setTimeout(nextQuestion, 600);
}

// ================= WIN =================
function winGame(){

    winSound.currentTime = 0;
    winSound.play().catch(()=>{});

    document.body.style.filter = "hue-rotate(180deg)";
    setTimeout(()=>document.body.style.filter = "none", 300);

    document.getElementById("messageBox").innerHTML =
        "🏆 SYSTEM SECURED - VICTORY 🏆";

    document.getElementById("restartBtn").style.display = "inline-block";
}

// ================= LOSE =================
function gameOver(){

    loseSound.currentTime = 0;
    loseSound.play().catch(()=>{});

    document.body.style.filter = "hue-rotate(0deg) contrast(2)";
    setTimeout(()=>document.body.style.filter = "none", 300);

    document.getElementById("messageBox").innerHTML =
        "💀 SYSTEM BREACHED - GAME OVER 💀";

    document.getElementById("restartBtn").style.display = "inline-block";
}

// ================= MENU =================
function backToMenu(){
    document.getElementById("game").style.display = "none";
    document.getElementById("startScreen").style.display = "block";
}

</script>

</body>
</html>
