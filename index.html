<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Cyber Guard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(#050510,#10103a);
    color:white;
    text-align:center;
}

/* JUDUL */
h1{
    margin-top:20px;
    color:#00e5ff;
    text-shadow:0 0 10px cyan;
}

/* KARAKTER */
.characters{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    margin-top:20px;
    flex-wrap:wrap;
}

.card{
    width:220px;
    padding:20px;
    border-radius:20px;
    background:#15153a;
    box-shadow:0 0 20px rgba(0,255,255,0.3);
}

.card h2{
    margin:10px 0;
}

.hero{
    border:2px solid cyan;
}

.enemy{
    border:2px solid red;
    box-shadow:0 0 20px rgba(255,0,0,0.4);
}

.icon{
    font-size:90px;
}

.hero .name{
    color:cyan;
}

.enemy .name{
    color:#ff3c3c;
}

.desc{
    font-size:14px;
    opacity:0.9;
}

/* GAME */
#messageBox{
    background:#1c1c3c;
    padding:20px;
    border-radius:10px;
    width:80%;
    margin:20px auto;
    word-break:break-all;
    font-size:20px;
}

button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.aman{
    background:#2ecc71;
    color:white;
}

.phishing{
    background:#e74c3c;
    color:white;
}

#restartBtn{
    display:none;
    background:orange;
    color:white;
}

#lives{
    font-size:25px;
    margin-top:10px;
}

#feedback{
    font-size:22px;
    margin-top:10px;
}

#startScreen{
    margin-top:80px;
}

.startBtn{
    background:cyan;
    color:black;
    font-weight:bold;
}

.menuBtn{
    background:#00bcd4;
    color:white;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>🛡️ CYBER GUARD 🦠</h1>

<!-- START -->
<div id="startScreen">

    <div class="characters">

        <!-- CYBER -->
        <div class="card hero">
            <div class="icon">🤖</div>
            <h2 class="name">CYBER</h2>
            <p class="desc">
                Robot AI penjaga internet yang bertugas
                melindungi pengguna dari phishing dan malware.
            </p>
        </div>

        <!-- TROJANX -->
        <div class="card enemy">
            <div class="icon">🦠</div>
            <h2 class="name">TROJANX</h2>
            <p class="desc">
                Virus berbahaya dari link phishing
                yang mencoba mencuri data pengguna.
            </p>
        </div>

    </div>

    <br>

    <button class="startBtn" onclick="startGame()">
        START GAME
    </button>

</div>

<!-- GAME -->
<div id="game" style="display:none;">

    <div style="font-size:70px;">
        🤖 ⚔️ 🦠
    </div>

    <div id="lives">❤️❤️❤️❤️❤️</div>

    <div id="messageBox"></div>

    <div id="buttons">
        <button class="aman" onclick="answer('aman')">
            AMAN
        </button>

        <button class="phishing" onclick="answer('phishing')">
            PHISHING
        </button>
    </div>

    <div id="feedback"></div>

    <h2 id="score">Score: 0 / 50</h2>

    <!-- MENU -->
    <button class="menuBtn" onclick="backToMenu()">
        🏠 MENU UTAMA
    </button>

    <br>

    <button id="restartBtn" onclick="resetGame()">
        ULANG
    </button>

</div>

<script>

// DATA LINK (LEBIH SUSAH)
const messages = [

    // PHISHING
    { text:"http://bank-login.xyz", type:"phishing" },
    { text:"http://freegift123.click", type:"phishing" },
    { text:"http://secure-akun-verif.net", type:"phishing" },
    { text:"http://login-bank-fake.com", type:"phishing" },
    { text:"https://tokopedia-verifikasi.id", type:"phishing" },
    { text:"https://youtube-premium-gratis.xyz", type:"phishing" },
    { text:"https://bri-login-security.net", type:"phishing" },
    { text:"http://hadiah-shopee2026.click", type:"phishing" },
    { text:"https://google-account-checker.xyz", type:"phishing" },
    { text:"https://freefire-skin-gratis.net", type:"phishing" },

    // AMAN
    { text:"https://www.google.com", type:"aman" },
    { text:"https://www.youtube.com", type:"aman" },
    { text:"https://www.bri.co.id", type:"aman" },
    { text:"https://www.tokopedia.com", type:"aman" },
    { text:"https://store.steampowered.com", type:"aman" },
    { text:"https://www.microsoft.com", type:"aman" },
    { text:"https://www.github.com", type:"aman" },
    { text:"https://www.whatsapp.com", type:"aman" },
    { text:"https://www.instagram.com", type:"aman" },
    { text:"https://accounts.google.com", type:"aman" }

];

let score = 0;
let lives = 5;
let shuffledQuestions = [];
let currentIndex = 0;
let current;

// SHUFFLE
function shuffleArray(array){

    for(let i=array.length-1;i>0;i--){

        let j = Math.floor(Math.random()*(i+1));

        [array[i],array[j]] = [array[j],array[i]];
    }
}

// START
function startGame(){

    document.getElementById("startScreen").style.display = "none";

    document.getElementById("game").style.display = "block";

    resetGame();
}

// RESET
function resetGame(){

    score = 0;
    lives = 5;
    currentIndex = 0;

    shuffledQuestions = [...messages];

    shuffleArray(shuffledQuestions);

    document.getElementById("restartBtn").style.display = "none";

    document.getElementById("buttons").style.display = "block";

    updateHUD();

    newQuestion();
}

// HUD
function updateHUD(){

    document.getElementById("score").innerText =
        "Score: " + score + " / 50";

    document.getElementById("lives").innerText =
        "❤️".repeat(lives);
}

// SOAL BARU
function newQuestion(){

    if(currentIndex >= shuffledQuestions.length){

        shuffleArray(shuffledQuestions);

        currentIndex = 0;
    }

    current = shuffledQuestions[currentIndex++];

    document.getElementById("messageBox").innerText =
        current.text;

    document.getElementById("feedback").innerText = "";
}

// JAWAB
function answer(choice){

    if(choice === current.type){

        score += 5;

        document.getElementById("feedback").innerHTML =
            "✅ Cyber berhasil memblokir TrojanX! (+5)";

    }else{

        lives--;

        document.getElementById("feedback").innerHTML =
            "❌ TrojanX menyerang sistem!";
    }

    updateHUD();

    // MENANG
    if(score >= 50){

        winGame();

        return;
    }

    // KALAH
    if(lives <= 0){

        gameOver();

        return;
    }

    setTimeout(newQuestion,800);
}

// GAME OVER
function gameOver(){

    document.getElementById("messageBox").innerHTML =
        "💀 GAME OVER 💀<br><br>TrojanX berhasil menguasai sistem!";

    document.getElementById("buttons").style.display = "none";

    document.getElementById("restartBtn").style.display =
        "inline-block";
}

// MENANG
function winGame(){

    document.getElementById("messageBox").innerHTML =
        "🏆 VICTORY 🏆<br><br>Cyber berhasil mengalahkan TrojanX dan menyelamatkan sistem!";

    document.getElementById("buttons").style.display = "none";

    document.getElementById("restartBtn").style.display =
        "inline-block";
}

// MENU UTAMA
function backToMenu(){

    document.getElementById("game").style.display = "none";

    document.getElementById("startScreen").style.display = "block";

    score = 0;
    lives = 5;

    document.getElementById("score").innerText =
        "Score: 0 / 50";

    document.getElementById("lives").innerText =
        "❤️❤️❤️❤️❤️";

    document.getElementById("restartBtn").style.display =
        "none";

    document.getElementById("buttons").style.display =
        "block";

    document.getElementById("feedback").innerText = "";

    document.getElementById("messageBox").innerText = "";
}

</script>

</body>
</html>
